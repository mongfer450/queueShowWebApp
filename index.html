<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Queue Status - Hello.mirilash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fdf2f8; color: #334155; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        input[type="date"]::-webkit-calendar-picker-indicator {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            margin: 0; padding: 0; cursor: pointer; opacity: 0;
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md text-center mb-8 mt-10">
        <h1 class="text-3xl font-bold text-pink-500 mb-2">Hello.mirilash</h1>
        <p class="text-slate-400 text-sm tracking-wide">เช็คคิวว่างเพื่อจองบริการ 🌸</p>
    </div>

    <div class="w-full max-w-md glass-card rounded-[2.5rem] p-6 shadow-2xl shadow-pink-200/50">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-lg font-bold text-slate-700">ตารางคิว</h2>
            
            <div class="relative group">
                <label for="dateSelector" id="currentDateDisplay" 
                       class="text-xs bg-pink-500 text-white px-4 py-2 rounded-full font-medium shadow-md shadow-pink-200 active:scale-95 transition-all cursor-pointer block">
                    กำลังโหลด...
                </label>
                <input type="date" id="dateSelector" class="absolute inset-0 opacity-0 w-full h-full cursor-pointer" onchange="fetchQueue()">
            </div>
        </div>

        <div id="loader" class="flex flex-col justify-center items-center py-16">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-pink-500 mb-4"></div>
            <p class="text-xs text-slate-400">กำลังตรวจสอบปฏิทิน...</p>
        </div>

        <div id="queueContainer" class="space-y-3 hidden">
            </div>

        <div id="copySection" class="mt-6 hidden">
            <button onclick="copyAvailableSlots()" class="w-full bg-white border-2 border-pink-400 text-pink-500 font-bold py-3 rounded-2xl active:scale-95 transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
                <span>📋 คัดลอกคิวว่างส่งลูกค้า</span>
            </button>
        </div>

        <div class="mt-8 pt-6 border-t border-pink-50">
            <div class="flex justify-center gap-8 text-[11px] font-bold tracking-widest text-slate-400 uppercase">
                <div class="flex items-center gap-2">
                    <div class="w-2.5 h-2.5 bg-pink-400 rounded-full"></div> จองแล้ว
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2.5 h-2.5 border-2 border-pink-200 rounded-full"></div> ว่าง
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzd2nXgnGC9sbsC8mINCenFnPIYN_wZydSji_xVbmTKy6bJuaIRRyjbsfjBmSd7rBar/exec";
        let availableSlotsGlobal = []; // เก็บตัวแปรไว้สำหรับก๊อปปี้

        document.addEventListener("DOMContentLoaded", () => {
            const today = new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Bangkok" }).format(new Date());
            document.getElementById('dateSelector').value = today;
            fetchQueue();
        });

        async function fetchQueue() {
            const dateInput = document.getElementById('dateSelector');
            const selectedDate = dateInput.value;
            const loader = document.getElementById('loader');
            const container = document.getElementById('queueContainer');
            const copyBtn = document.getElementById('copySection');
            const dateDisplay = document.getElementById('currentDateDisplay');

            const options = { day: '2-digit', month: 'long', year: 'numeric' };
            dateDisplay.innerText = new Date(selectedDate).toLocaleDateString('th-TH', options);

            loader.classList.remove('hidden');
            container.classList.add('hidden');
            copyBtn.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?date=${selectedDate}`);
                const busySlots = await response.json();
                renderQueue(selectedDate, busySlots);
            } catch (error) {
                container.innerHTML = "<p class='text-center text-red-400 py-10 text-sm'>ขออภัย โหลดข้อมูลไม่สำเร็จ</p>";
            } finally {
                loader.classList.add('hidden');
                container.classList.remove('hidden');
                copyBtn.classList.remove('hidden');
            }
        }

        function renderQueue(selectedDate, busySlots) {
            const container = document.getElementById('queueContainer');
            const times = ["8:00","9:00","10:00", "11:00", "12:00", "13:00", "14:00", "15:00", "16:00", "17:00", "18:00", "19:00", "20:00", "21:00", "22:00", "23:00"];
            
            availableSlotsGlobal = []; // รีเซ็ตค่าใหม่ทุกครั้งที่โหลด

            container.innerHTML = times.map(time => {
                const isBusy = checkIsBusy(selectedDate, time, busySlots);
                if (!isBusy) availableSlotsGlobal.push(time); // เก็บเฉพาะคิวที่ว่าง

                return `
                    <div class="flex items-center justify-between p-4 rounded-[1.5rem] transition-all duration-300 ${isBusy ? 'bg-pink-50/50 opacity-60' : 'bg-white border border-pink-50 shadow-sm'}">
                        <span class="font-bold ${isBusy ? 'text-pink-300' : 'text-slate-600'} text-lg">${time}</span>
                        <div class="flex items-center">
                            ${isBusy 
                                ? '<span class="text-[10px] bg-pink-100 text-pink-400 px-4 py-1.5 rounded-full font-black tracking-tighter">BUSY</span>' 
                                : '<span class="text-[10px] bg-green-50 text-green-400 px-4 py-1.5 rounded-full font-black tracking-tighter">AVAILABLE</span>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function checkIsBusy(selectedDate, checkTime, busySlots) {
            const [checkH, checkM] = checkTime.split(':').map(Number);
            const checkDate = new Date(selectedDate + "T00:00:00+07:00");
            checkDate.setHours(checkH, checkM, 0);

            return busySlots.some(slot => {
                const start = new Date(slot.start);
                const end = new Date(slot.end);
                return checkDate >= start && checkDate < end;
            });
        }

        // ✅ ฟังก์ชันก๊อปปี้ข้อความคิวว่าง
        async function copyAvailableSlots() {
            if (availableSlotsGlobal.length === 0) {
                alert("วันนี้ไม่มีคิวว่างแล้วค่า ❌");
                return;
            }
            
            const timeString = availableSlotsGlobal.join(", ");
            const message = `จะมีคิวว่าง ${timeString} ค่า💖`;
            
            try {
                await navigator.clipboard.writeText(message);
                alert("คัดลอกข้อความแล้ว:\n" + message);
            } catch (err) {
                alert("คัดลอกล้มเหลว กรุณาลองใหม่");
            }
        }
    </script>
</body>
</html>
