<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Queue Status - Hello.mirilash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Kanit", sans-serif;
        background-color: #fdf2f8;
        color: #334155;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      input[type="date"]::-webkit-calendar-picker-indicator {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        cursor: pointer;
        opacity: 0;
      }
    </style>
  </head>
  <body class="p-4 flex flex-col items-center min-h-screen">
    <div class="w-full max-w-md text-center mb-8 mt-10">
      <h1 class="text-3xl font-bold text-pink-500 mb-2">Hello.mirilash</h1>
      <p class="text-slate-400 text-sm tracking-wide">
        คิวว่างที่เปิดจองตอนนี้ค่าา💖
      </p>
      <p class="text-slate-400 text-sm tracking-wide">(สอบถามแอดมินก่อนนะค่า คิวอาจจะ ว่าง/เต็ม ค่า)</p>
    </div>

    <div
      class="w-full max-w-md glass-card rounded-[2.5rem] p-6 shadow-2xl shadow-pink-200/50"
    >
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-lg font-bold text-slate-700">เลือกวันที่</h2>

        <div class="relative group">
          <label
            for="dateSelector"
            id="currentDateDisplay"
            class="text-xs bg-pink-500 text-white px-4 py-2 rounded-full font-medium shadow-md shadow-pink-200 active:scale-95 transition-all cursor-pointer block"
          >
            กำลังโหลด...
          </label>
          <input
            type="date"
            id="dateSelector"
            class="absolute inset-0 opacity-0 w-full h-full cursor-pointer"
            onchange="fetchQueue()"
          />
        </div>
      </div>

      <div id="loader" class="flex flex-col justify-center items-center py-16">
        <div
          class="animate-spin rounded-full h-10 w-10 border-b-2 border-pink-500 mb-4"
        ></div>
        <p class="text-xs text-slate-400">กำลังตรวจสอบคิวว่าง...</p>
      </div>

      <div id="queueContainer" class="space-y-3 hidden"></div>

      <div id="ctaSection" class="mt-6 hidden">
        <a
          href="https://lin.ee/RRGrXcQ"
          target="_blank"
          class="w-full bg-[#06C755] text-white font-bold py-4 rounded-2xl active:scale-95 transition-all flex items-center justify-center gap-2 text-sm shadow-md"
        >
          <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
            <path
              d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.121.303.079.778.039 1.085l-.171 1.027c-.052.303-.242 1.186 1.039.647 1.281-.54 6.911-4.069 9.428-6.967 1.739-1.907 2.532-3.791 2.532-6.002z"
            />
          </svg>
          <span>จองคิวผ่าน Line</span>
        </a>
      </div>
    </div>

    <p class="text-slate-400 text-sm tracking-wide mt-4">
        จองได้ที่ Line: <a href="https://lin.ee/RRGrXcQ" target="_blank" class="text-pink-500 font-medium">Hello.mirilash</a>
      </p>
    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycbzd2nXgnGC9sbsC8mINCenFnPIYN_wZydSji_xVbmTKy6bJuaIRRyjbsfjBmSd7rBar/exec";

      document.addEventListener("DOMContentLoaded", () => {
        const today = new Intl.DateTimeFormat("en-CA", {
          timeZone: "Asia/Bangkok",
        }).format(new Date());
        document.getElementById("dateSelector").value = today;
        fetchQueue();
      });

      async function fetchQueue() {
        const dateInput = document.getElementById("dateSelector");
        const selectedDate = dateInput.value;
        const loader = document.getElementById("loader");
        const container = document.getElementById("queueContainer");
        const ctaBtn = document.getElementById("ctaSection");
        const dateDisplay = document.getElementById("currentDateDisplay");

        const options = { day: "2-digit", month: "long", year: "numeric" };
        dateDisplay.innerText = new Date(selectedDate).toLocaleDateString(
          "th-TH",
          options,
        );

        loader.classList.remove("hidden");
        container.classList.add("hidden");
        ctaBtn.classList.add("hidden");

        try {
          const response = await fetch(`${API_URL}?date=${selectedDate}`);
          const busySlots = await response.json();
          renderAvailableOnly(selectedDate, busySlots);
        } catch (error) {
          container.innerHTML =
            "<p class='text-center text-red-400 py-10 text-sm'>ขออภัย โหลดข้อมูลไม่สำเร็จ</p>";
          container.classList.remove("hidden");
        } finally {
          loader.classList.add("hidden");
        }
      }

      /* --- ปรับปรุง Logic การเช็คคิวว่าง (Support Overlapping Events) --- */

      function renderAvailableOnly(selectedDate, busySlots) {
        const container = document.getElementById("queueContainer");
        const ctaBtn = document.getElementById("ctaSection");
        const times = [
          "8:00",
          "9:00",
          "10:00",
          "11:00",
          "12:00",
          "13:00",
          "14:00",
          "15:00",
          "16:00",
          "17:00",
          "18:00",
          "19:00",
          "20:00",
          "21:00",
          "22:00",
          "23:00",
        ];

        const now = new Date();

        const availableHTML = times
          .filter((time) => {
            // 1. ตรวจสอบเวลาที่ผ่านไปแล้ว (เทียบกับเวลาปัจจุบัน)
            const [h, m] = time.split(":").map(Number);
            const slotStart = new Date(selectedDate + "T00:00:00+07:00");
            slotStart.setHours(h, m, 0);

            if (slotStart <= now) return false;

            // 2. ตรวจสอบการทับซ้อนของ Event (Overlap Logic)
            // กำหนดให้ 1 คิวใช้เวลา 1 ชม. (slotStart ถึง slotEnd)
            const slotEnd = new Date(slotStart.getTime() + 60 * 60 * 1000);

            const isOverlap = busySlots.some((event) => {
              const eventStart = new Date(event.start);
              const eventEnd = new Date(event.end);

              // Logic: ถ้าเวลาเริ่มของนัดในปฏิทิน น้อยกว่า เวลาจบของคิวเรา
              // และ เวลาจบของนัดในปฏิทิน มากกว่า เวลาเริ่มของคิวเรา แสดงว่าทับกัน
              return eventStart < slotEnd && eventEnd > slotStart;
            });

            return !isOverlap; // ถ้าไม่ทับเลย ถึงจะแสดงว่าว่าง
          })
          .map(
            (time) => `
        <div class="flex items-center justify-between p-4 rounded-[1.5rem] bg-white border border-pink-50 shadow-sm transition-all hover:border-pink-200">
            <span class="font-bold text-slate-600 text-lg">${time}</span>
            <span class="text-[10px] bg-green-50 text-green-500 px-4 py-1.5 rounded-full font-black tracking-tighter uppercase">Available</span>
        </div>
    `,
          )
          .join("");

        if (availableHTML) {
          container.innerHTML = availableHTML;
          ctaBtn.classList.remove("hidden");
        } else {
          container.innerHTML =
            "<p class='text-center text-slate-400 py-10 text-sm'>ไม่มีคิวว่างที่สามารถจองได้ในวันนี้ค่า 🌸</p>";
          ctaBtn.classList.add("hidden");
        }
        container.classList.remove("hidden");
      }

      // ลบฟังก์ชัน checkIsBusy ตัวเก่าออกได้เลย เพราะเรายุบรวมไว้ใน filter ด้านบนแล้วครับ
    </script>
  </body>
</html>
